version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: equipment-portal-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studysync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portal-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: equipment-portal-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@portal.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - portal-net

networks:
  portal-net:
    driver: bridge

volumes:
  postgres_data:
