version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: studysync-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studysync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studysync-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: studysync-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@studysync.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - studysync-net

networks:
  studysync-net:
    driver: bridge

volumes:
  postgres_data:
